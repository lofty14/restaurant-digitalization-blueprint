<svg viewBox="0 0 960 668" width="960" height="668" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="960" height="668" rx="16" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="480" y="52" text-anchor="middle" font-size="27" font-weight="700" fill="#f8fafc">餐饮连锁数字化 + AI 全景蓝图</text>
  <text x="480" y="80" text-anchor="middle" font-size="14" fill="#94a3b8">1 个人 + AI · 订货 / 库存 / 生产 / 财务 / 门店运营 / 拓店招商 全链路 · 不放代码，放可复刻的蓝图</text>

  <!-- 成效徽章 -->
  <g font-size="11.5" font-weight="600" text-anchor="middle">
    <rect x="182" y="94" width="216" height="24" rx="12" fill="#1e293b" stroke="#334155"/>
    <text x="290" y="110" fill="#34d399">财务 0 表格 · 每天 10 分钟做内账</text>
    <rect x="410" y="94" width="152" height="24" rx="12" fill="#1e293b" stroke="#334155"/>
    <text x="486" y="110" fill="#fbbf24">凭证 9 成自动生成</text>
    <rect x="574" y="94" width="204" height="24" rx="12" fill="#1e293b" stroke="#334155"/>
    <text x="676" y="110" fill="#f87171">需求 → AI 改码 → 审批 → 上线</text>
  </g>

  <!-- ── 客户端 / 数据入口 ── -->
  <text x="52" y="144" font-size="12" fill="#64748b" font-weight="600">客户端 / 数据入口</text>
  <g font-size="15" font-weight="600" fill="#e2e8f0" text-anchor="middle">
    <rect x="46" y="154" width="204" height="58" rx="9" fill="#1e293b" stroke="#334155"/>
    <text x="148" y="179">管理端 Web</text>
    <text x="148" y="200" font-size="12" font-weight="400" fill="#94a3b8">Vue3 · 总部同学用</text>

    <rect x="266" y="154" width="204" height="58" rx="9" fill="#1e293b" stroke="#334155"/>
    <text x="368" y="179">门店小程序</text>
    <text x="368" y="200" font-size="12" font-weight="400" fill="#94a3b8">uni-app · 店长店员用</text>

    <rect x="486" y="154" width="204" height="58" rx="9" fill="#1e293b" stroke="#334155"/>
    <text x="588" y="179">官网 SSR</text>
    <text x="588" y="200" font-size="12" font-weight="400" fill="#94a3b8">Nuxt3 · 获客 + AI 搜索收录</text>

    <rect x="706" y="154" width="204" height="58" rx="9" fill="#1e293b" stroke="#334155"/>
    <text x="808" y="179">Chrome 插件矩阵</text>
    <text x="808" y="200" font-size="12" font-weight="400" fill="#94a3b8">外卖数据半自动抓取</text>
  </g>

  <line x1="480" y1="218" x2="480" y2="242" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── 后端单体 ── -->
  <rect x="46" y="250" width="864" height="262" rx="12" fill="#0b1220" stroke="#334155"/>
  <text x="66" y="278" font-size="14" font-weight="700" fill="#e2e8f0">后端单体（唯一数据与接口中枢）</text>
  <text x="894" y="278" font-size="12" fill="#94a3b8" text-anchor="end">Django + MySQL + Redis + Celery</text>

  <g font-size="15" font-weight="600" fill="#f1f5f9">
    <!-- 第一行 -->
    <rect x="66" y="292" width="266" height="62" rx="8" fill="#1e293b"/>
    <rect x="66" y="292" width="4" height="62" rx="2" fill="#38bdf8"/>
    <text x="82" y="318">交易域</text>
    <text x="82" y="340" font-size="12" font-weight="400" fill="#94a3b8">订货商城 · 库存 · 退货</text>

    <rect x="345" y="292" width="266" height="62" rx="8" fill="#1e293b"/>
    <rect x="345" y="292" width="4" height="62" rx="2" fill="#34d399"/>
    <text x="361" y="318">运营域</text>
    <text x="361" y="340" font-size="12" font-weight="400" fill="#94a3b8">营业额 · 开收档 · 巡检经营分 · 日报</text>

    <rect x="624" y="292" width="266" height="62" rx="8" fill="#1e293b"/>
    <rect x="624" y="292" width="4" height="62" rx="2" fill="#fbbf24"/>
    <text x="640" y="318">生产域</text>
    <text x="640" y="340" font-size="12" font-weight="400" fill="#94a3b8">研发档案 · 成本卡 · 工单批次追溯</text>

    <!-- 第二行 -->
    <rect x="66" y="368" width="266" height="62" rx="8" fill="#1e293b"/>
    <rect x="66" y="368" width="4" height="62" rx="2" fill="#f472b6"/>
    <text x="82" y="394">财务域</text>
    <text x="82" y="416" font-size="12" font-weight="400" fill="#94a3b8">事件源自动凭证 · 银企直联 · 0 表格</text>

    <rect x="345" y="368" width="266" height="62" rx="8" fill="#1e293b"/>
    <rect x="345" y="368" width="4" height="62" rx="2" fill="#2dd4bf"/>
    <text x="361" y="394">供应链域</text>
    <text x="361" y="416" font-size="12" font-weight="400" fill="#94a3b8">供应商协同 · 三方代仓 · 区域代理仓</text>

    <rect x="624" y="368" width="266" height="62" rx="8" fill="#1e293b"/>
    <rect x="624" y="368" width="4" height="62" rx="2" fill="#a78bfa"/>
    <text x="640" y="394">增长域</text>
    <text x="640" y="416" font-size="12" font-weight="400" fill="#94a3b8">选址 · CRM 招商 · 外卖运营</text>

    <!-- 第三行：AI 域通栏 -->
    <rect x="66" y="444" width="824" height="54" rx="8" fill="#1e293b"/>
    <rect x="66" y="444" width="4" height="54" rx="2" fill="#f87171"/>
    <text x="82" y="466">AI 域</text>
    <text x="82" y="488" font-size="12" font-weight="400" fill="#94a3b8">改码机器人（需求 → AI 改码 → 人审批 → 上线） · 岗位 AI 助手 · 门店 AI 巡检 · 工厂 AI 巡检 · 群聊即操作（录营业额 / 兑积分）</text>
  </g>

  <line x1="480" y1="518" x2="480" y2="542" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── 第三方 ── -->
  <g font-size="13" font-weight="500" fill="#cbd5e1" text-anchor="middle">
    <rect x="46" y="550" width="204" height="44" rx="9" fill="#1e293b" stroke="#334155" stroke-dasharray="4 3"/>
    <text x="148" y="577">企业 IM（飞书/钉钉/企微）</text>
    <rect x="266" y="550" width="204" height="44" rx="9" fill="#1e293b" stroke="#334155" stroke-dasharray="4 3"/>
    <text x="368" y="577">支付 / 银行流水</text>
    <rect x="486" y="550" width="204" height="44" rx="9" fill="#1e293b" stroke="#334155" stroke-dasharray="4 3"/>
    <text x="588" y="577">外卖平台 ×3</text>
    <rect x="706" y="550" width="204" height="44" rx="9" fill="#1e293b" stroke="#334155" stroke-dasharray="4 3"/>
    <text x="808" y="577">地图 / 人口公开数据</text>
  </g>

  <!-- ── 底部：五层文档地图 ── -->
  <line x1="46" y1="616" x2="910" y2="616" stroke="#334155" stroke-width="1"/>
  <text x="52" y="645" font-size="12" fill="#64748b" font-weight="600">本仓五层</text>
  <g font-size="13" fill="#94a3b8">
    <text x="130" y="645"><tspan fill="#38bdf8" font-weight="600">01</tspan> 架构决策</text>
    <text x="242" y="645" fill="#475569">→</text>
    <text x="272" y="645"><tspan fill="#34d399" font-weight="600">02</tspan> 业务模块 ×14</text>
    <text x="412" y="645" fill="#475569">→</text>
    <text x="442" y="645"><tspan fill="#fbbf24" font-weight="600">03</tspan> 踩坑实录</text>
    <text x="554" y="645" fill="#475569">→</text>
    <text x="584" y="645"><tspan fill="#f472b6" font-weight="600">04</tspan> AI 工程实践</text>
    <text x="710" y="645" fill="#475569">→</text>
    <text x="740" y="645"><tspan fill="#f87171" font-weight="600">05</tspan> AI 复刻指令 ×13</text>
  </g>
</svg>
