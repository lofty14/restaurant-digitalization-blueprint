<svg viewBox="0 0 960 600" width="960" height="600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="960" height="600" rx="16" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="480" y="52" text-anchor="middle" font-size="27" font-weight="700" fill="#f8fafc">餐饮连锁数字化 + AI 全景蓝图</text>
  <text x="480" y="80" text-anchor="middle" font-size="14" fill="#94a3b8">1 个人 + AI · 订货 / 库存 / 生产 / 财务 / 门店运营 / 拓店招商 全链路 · 不放代码，放可复刻的蓝图</text>

  <!-- ── 客户端 / 数据入口 ── -->
  <text x="52" y="116" font-size="12" fill="#64748b" font-weight="600">客户端 / 数据入口</text>
  <g font-size="15" font-weight="600" fill="#e2e8f0" text-anchor="middle">
    <rect x="46" y="126" width="204" height="58" rx="9" fill="#1e293b" stroke="#334155"/>
    <text x="148" y="151">管理端 Web</text>
    <text x="148" y="172" font-size="12" font-weight="400" fill="#94a3b8">Vue3 · 总部同学用</text>

    <rect x="266" y="126" width="204" height="58" rx="9" fill="#1e293b" stroke="#334155"/>
    <text x="368" y="151">门店小程序</text>
    <text x="368" y="172" font-size="12" font-weight="400" fill="#94a3b8">uni-app · 店长店员用</text>

    <rect x="486" y="126" width="204" height="58" rx="9" fill="#1e293b" stroke="#334155"/>
    <text x="588" y="151">官网 SSR</text>
    <text x="588" y="172" font-size="12" font-weight="400" fill="#94a3b8">Nuxt3 · 获客 + AI 搜索收录</text>

    <rect x="706" y="126" width="204" height="58" rx="9" fill="#1e293b" stroke="#334155"/>
    <text x="808" y="151">Chrome 插件矩阵</text>
    <text x="808" y="172" font-size="12" font-weight="400" fill="#94a3b8">外卖数据半自动抓取</text>
  </g>

  <line x1="480" y1="190" x2="480" y2="214" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── 后端单体 ── -->
  <rect x="46" y="222" width="864" height="196" rx="12" fill="#0b1220" stroke="#334155"/>
  <text x="66" y="250" font-size="14" font-weight="700" fill="#e2e8f0">后端单体（唯一数据与接口中枢）</text>
  <text x="894" y="250" font-size="12" fill="#94a3b8" text-anchor="end">Django + MySQL + Redis + Celery</text>

  <g font-size="15" font-weight="600" fill="#f1f5f9">
    <!-- 第一行 -->
    <rect x="66" y="264" width="266" height="62" rx="8" fill="#1e293b"/>
    <rect x="66" y="264" width="4" height="62" rx="2" fill="#38bdf8"/>
    <text x="82" y="290">交易域</text>
    <text x="82" y="312" font-size="12" font-weight="400" fill="#94a3b8">订货商城 · 库存 · 退货</text>

    <rect x="345" y="264" width="266" height="62" rx="8" fill="#1e293b"/>
    <rect x="345" y="264" width="4" height="62" rx="2" fill="#34d399"/>
    <text x="361" y="290">运营域</text>
    <text x="361" y="312" font-size="12" font-weight="400" fill="#94a3b8">营业额 · 开收档 · 巡检经营分 · 日报</text>

    <rect x="624" y="264" width="266" height="62" rx="8" fill="#1e293b"/>
    <rect x="624" y="264" width="4" height="62" rx="2" fill="#fbbf24"/>
    <text x="640" y="290">生产域</text>
    <text x="640" y="312" font-size="12" font-weight="400" fill="#94a3b8">研发档案 · 成本卡 · 工单批次追溯</text>

    <!-- 第二行 -->
    <rect x="66" y="340" width="266" height="62" rx="8" fill="#1e293b"/>
    <rect x="66" y="340" width="4" height="62" rx="2" fill="#f472b6"/>
    <text x="82" y="366">财务域</text>
    <text x="82" y="388" font-size="12" font-weight="400" fill="#94a3b8">自建内账引擎 · 事件源自动凭证</text>

    <rect x="345" y="340" width="266" height="62" rx="8" fill="#1e293b"/>
    <rect x="345" y="340" width="4" height="62" rx="2" fill="#a78bfa"/>
    <text x="361" y="366">增长域</text>
    <text x="361" y="388" font-size="12" font-weight="400" fill="#94a3b8">选址 · CRM 招商 · 外卖运营</text>

    <rect x="624" y="340" width="266" height="62" rx="8" fill="#1e293b"/>
    <rect x="624" y="340" width="4" height="62" rx="2" fill="#f87171"/>
    <text x="640" y="366">AI 域</text>
    <text x="640" y="388" font-size="12" font-weight="400" fill="#94a3b8">改码机器人 · 岗位助手 · 视觉巡检 · 群聊办事</text>
  </g>

  <line x1="480" y1="424" x2="480" y2="448" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── 第三方 ── -->
  <g font-size="13" font-weight="500" fill="#cbd5e1" text-anchor="middle">
    <rect x="46" y="456" width="204" height="44" rx="9" fill="#1e293b" stroke="#334155" stroke-dasharray="4 3"/>
    <text x="148" y="483">企业 IM（飞书/钉钉/企微）</text>
    <rect x="266" y="456" width="204" height="44" rx="9" fill="#1e293b" stroke="#334155" stroke-dasharray="4 3"/>
    <text x="368" y="483">支付</text>
    <rect x="486" y="456" width="204" height="44" rx="9" fill="#1e293b" stroke="#334155" stroke-dasharray="4 3"/>
    <text x="588" y="483">外卖平台 ×3</text>
    <rect x="706" y="456" width="204" height="44" rx="9" fill="#1e293b" stroke="#334155" stroke-dasharray="4 3"/>
    <text x="808" y="483">地图 / 人口公开数据</text>
  </g>

  <!-- ── 底部：五层文档地图 ── -->
  <line x1="46" y1="522" x2="910" y2="522" stroke="#334155" stroke-width="1"/>
  <text x="52" y="551" font-size="12" fill="#64748b" font-weight="600">本仓五层</text>
  <g font-size="13" fill="#94a3b8">
    <text x="130" y="551"><tspan fill="#38bdf8" font-weight="600">01</tspan> 架构决策</text>
    <text x="242" y="551" fill="#475569">→</text>
    <text x="272" y="551"><tspan fill="#34d399" font-weight="600">02</tspan> 业务模块 ×14</text>
    <text x="412" y="551" fill="#475569">→</text>
    <text x="442" y="551"><tspan fill="#fbbf24" font-weight="600">03</tspan> 踩坑实录</text>
    <text x="554" y="551" fill="#475569">→</text>
    <text x="584" y="551"><tspan fill="#f472b6" font-weight="600">04</tspan> AI 工程实践</text>
    <text x="710" y="551" fill="#475569">→</text>
    <text x="740" y="551"><tspan fill="#f87171" font-weight="600">05</tspan> AI 复刻指令 ×13</text>
  </g>
</svg>
