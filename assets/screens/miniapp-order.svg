<svg viewBox="0 0 400 800" width="400" height="800" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <!-- 手机外框 -->
  <rect x="0" y="0" width="400" height="800" rx="44" fill="#0f172a"/>
  <rect x="10" y="10" width="380" height="780" rx="36" fill="#f6f7f9"/>
  <!-- 刘海 -->
  <rect x="140" y="18" width="120" height="24" rx="12" fill="#0f172a"/>

  <!-- 状态栏 -->
  <text x="42" y="60" font-size="13" font-weight="600" fill="#111111">9:41</text>
  <text x="358" y="60" text-anchor="end" font-size="12" fill="#111111">📶 🔋</text>

  <!-- 导航栏 -->
  <text x="200" y="94" text-anchor="middle" font-size="16" font-weight="700" fill="#111111">订货商城</text>
  <rect x="288" y="76" width="76" height="26" rx="13" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="326" y="94" text-anchor="middle" font-size="11" fill="#666666">◉ ●</text>

  <!-- 搜索框 -->
  <rect x="28" y="112" width="344" height="34" rx="17" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="46" y="134" font-size="12.5" fill="#b0b0b0">🔍 搜索商品,如「羊肉串」</text>

  <!-- 分类 chips -->
  <g font-size="12.5" text-anchor="middle">
    <rect x="28" y="158" width="60" height="30" rx="15" fill="#e8590c"/>
    <text x="58" y="178" fill="#ffffff" font-weight="600">全部</text>
    <rect x="96" y="158" width="76" height="30" rx="15" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="134" y="178" fill="#333333">冷链食材</text>
    <rect x="180" y="158" width="76" height="30" rx="15" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="218" y="178" fill="#333333">常温调料</text>
    <rect x="264" y="158" width="76" height="30" rx="15" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="302" y="178" fill="#333333">包材耗材</text>
  </g>

  <!-- 商品卡片 2×3 -->
  <g>
    <!-- 卡1 -->
    <rect x="28" y="202" width="166" height="176" rx="12" fill="#ffffff"/>
    <rect x="28" y="202" width="166" height="96" rx="12" fill="#fde8d7"/>
    <rect x="28" y="286" width="166" height="12" fill="#ffffff"/>
    <text x="111" y="260" text-anchor="middle" font-size="34">🍢</text>
    <rect x="36" y="210" width="52" height="20" rx="10" fill="#0ea5e9"/>
    <text x="62" y="224" text-anchor="middle" font-size="10.5" fill="#ffffff">❄ 冷链</text>
    <text x="42" y="320" font-size="13" font-weight="600" fill="#111111">羊肉串(冻)</text>
    <text x="42" y="338" font-size="11" fill="#9b9b9b">40串/包 · 效期90天</text>
    <text x="42" y="364" font-size="15" font-weight="700" fill="#e8590c">¥58.0</text>
    <circle cx="172" cy="358" r="13" fill="#e8590c"/>
    <text x="172" y="363" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="700">+</text>

    <!-- 卡2 -->
    <rect x="206" y="202" width="166" height="176" rx="12" fill="#ffffff"/>
    <rect x="206" y="202" width="166" height="96" rx="12" fill="#fef3c7"/>
    <rect x="206" y="286" width="166" height="12" fill="#ffffff"/>
    <text x="289" y="260" text-anchor="middle" font-size="34">🌶️</text>
    <rect x="214" y="210" width="52" height="20" rx="10" fill="#f59e0b"/>
    <text x="240" y="224" text-anchor="middle" font-size="10.5" fill="#ffffff">常温</text>
    <text x="220" y="320" font-size="13" font-weight="600" fill="#111111">秘制撒料</text>
    <text x="220" y="338" font-size="11" fill="#9b9b9b">1kg/袋 · 快递发货</text>
    <text x="220" y="364" font-size="15" font-weight="700" fill="#e8590c">¥32.5</text>
    <circle cx="350" cy="358" r="13" fill="#e8590c"/>
    <text x="350" y="363" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="700">+</text>

    <!-- 卡3 -->
    <rect x="28" y="390" width="166" height="176" rx="12" fill="#ffffff"/>
    <rect x="28" y="390" width="166" height="96" rx="12" fill="#dbeafe"/>
    <rect x="28" y="474" width="166" height="12" fill="#ffffff"/>
    <text x="111" y="448" text-anchor="middle" font-size="34">🍗</text>
    <rect x="36" y="398" width="52" height="20" rx="10" fill="#0ea5e9"/>
    <text x="62" y="412" text-anchor="middle" font-size="10.5" fill="#ffffff">❄ 冷链</text>
    <text x="42" y="508" font-size="13" font-weight="600" fill="#111111">鸡翅中(腌)</text>
    <text x="42" y="526" font-size="11" fill="#9b9b9b">20只/包 · 效期60天</text>
    <text x="42" y="552" font-size="15" font-weight="700" fill="#e8590c">¥45.0</text>
    <circle cx="172" cy="546" r="13" fill="#e8590c"/>
    <text x="172" y="551" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="700">+</text>

    <!-- 卡4 -->
    <rect x="206" y="390" width="166" height="176" rx="12" fill="#ffffff"/>
    <rect x="206" y="390" width="166" height="96" rx="12" fill="#e2e8f0"/>
    <rect x="206" y="474" width="166" height="12" fill="#ffffff"/>
    <text x="289" y="448" text-anchor="middle" font-size="34">🥡</text>
    <rect x="214" y="398" width="52" height="20" rx="10" fill="#64748b"/>
    <text x="240" y="412" text-anchor="middle" font-size="10.5" fill="#ffffff">包材</text>
    <text x="220" y="508" font-size="13" font-weight="600" fill="#111111">打包盒(印LOGO)</text>
    <text x="220" y="526" font-size="11" fill="#9b9b9b">100只/箱</text>
    <text x="220" y="552" font-size="15" font-weight="700" fill="#e8590c">¥28.0</text>
    <circle cx="350" cy="546" r="13" fill="#e8590c"/>
    <text x="350" y="551" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="700">+</text>
  </g>

  <!-- 购物车结算条 -->
  <rect x="28" y="592" width="344" height="54" rx="27" fill="#111111"/>
  <circle cx="62" cy="619" r="18" fill="#e8590c"/>
  <text x="62" y="626" text-anchor="middle" font-size="16">🛒</text>
  <circle cx="76" cy="604" r="9" fill="#ef4444"/>
  <text x="76" y="608" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="700">12</text>
  <text x="94" y="617" font-size="14" font-weight="700" fill="#ffffff">¥486.5</text>
  <text x="94" y="634" font-size="10" fill="#9b9b9b">冷链已满起送 · 明日发货</text>
  <rect x="272" y="600" width="90" height="38" rx="19" fill="#e8590c"/>
  <text x="317" y="624" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">去结算</text>

  <!-- 底部 TabBar -->
  <line x1="10" y1="668" x2="390" y2="668" stroke="#e5e7eb"/>
  <g text-anchor="middle">
    <text x="66" y="700" font-size="18">🏠</text><text x="66" y="720" font-size="10" fill="#9b9b9b">首页</text>
    <text x="155" y="700" font-size="18">🛍️</text><text x="155" y="720" font-size="10" fill="#e8590c" font-weight="700">订货</text>
    <text x="245" y="700" font-size="18">📋</text><text x="245" y="720" font-size="10" fill="#9b9b9b">盘点</text>
    <text x="334" y="700" font-size="18">👤</text><text x="334" y="720" font-size="10" fill="#9b9b9b">我的</text>
  </g>
  <rect x="150" y="756" width="100" height="4" rx="2" fill="#111111"/>

  <text x="366" y="778" text-anchor="end" font-size="10" fill="#94a3b8">示意图·数据虚构</text>
</svg>
