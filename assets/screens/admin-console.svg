    <rect x="1084" y="402" width="36" height="20" rx="10" fill="#dbeafe"/><text x="1102" y="416" text-anchor="middle" font-size="11" fill="#2563eb">B+</text>
    <text x="810" y="454">示例五店</text><text x="1010" y="454" font-weight="700">83.2</text>
    <rect x="1084" y="440" width="36" height="20" rx="10" fill="#dbeafe"/><text x="1102" y="454" text-anchor="middle" font-size="11" fill="#2563eb">B</text>
